<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avant-Garde Poem Generator</title>
    <style>
        body {
            margin: 0 auto;
            font-family: Arial, sans-serif;

            width: 800px;
        }

        .poem-container {
            text-align: center;
            font-size: 24px;
        }

        #title {
            text-align: center;
        }

        .poem-container:first-letter,
        #title:first-letter {
            text-transform: capitalize
        }

        .flat-button {
            background-color: #3498db;
            /* Blue background */
            color: #fff;
            /* White text */
            border: none;
            /* No border */
            padding: 10px 20px;
            /* Adjust padding as needed */
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            /* Smooth transition for hover effect */
            margin: 0 auto;
            width: 150px;
            display: block;
            margin-top: 50px;
            
        }

        .flat-button:hover {
            background-color: #2980b9;
            /* Darker blue on hover */
        }
    </style>
</head>

<body>
    <div>
        <h1 id="title"></h1>
        <div id="poem" class="poem-container"></div>
        <button class="flat-button" onclick="load()">Regenerar</button>
    </div>

    <script>
        const connectors = [
            'por lo tanto', 'por consiguiente', 'y en conjunto a',
            'en la profundidad de', 'bajo la sombra de', 'en el umbral de', 'al compás de',
            'con la melodía de', 'en el ocaso de', 'en la brisa de', 'con el fulgor de',
            'y', 'pero', 'o', 'sin embargo', 'aunque', 'mientras tanto', 'y así',
            'como', 'así que', 'tal vez', 'por ende', 'en el éxtasis de', 'a través de',
            'dentro de', 'más allá de', 'en el abismo de', 'sobre', 'debajo de',
            'entre', 'cerca de', 'lejos de', 'alrededor de', 'junto a', 'a la par de',
            'a pesar de', 'incluso', 'aun cuando', 'dado que', 'debido a', 'porque sí',
            'como si', 'en el borde de', 'más', 'menos', 'junto con', 'después de',
            'antes de', 'durante', 'frente a', 'en medio de', 'al lado de', 'hacia',
            'contra', 'bajo', 'por encima de', 'alrededor', 'a través', 'de repente',
            'finalmente', 'repentinamente', 'silenciosamente', 'en el vacío de',
            'en el susurro de', 'en la penumbra de', 'en la danza de', 'en el sueño de',
            'con', 'sin', 'a', 'por', 'desde', 'hasta', 'hacia', 'para', 'según',
            'durante', 'mediante', 'hacia adelante', 'hacia atrás', 'por siempre',
            'jamás', 'en el eco de', 'en el canto de', 'en el grito de', 'al son de',
            'en el reflejo de', 'en el viento de', 'en el horizonte de', 'al alba de',
            'en el crepúsculo de', 'en la quietud de', 'bajo la lluvia de', 'en la neblina de',
            'cuando no menos', 'sin dudarlo', 'sin dudas', 'como si fuera', 'como si se tratara de',
            'despotricando contra', 'incluyendo', 'respirando', 'de la mano de', 
            'bajo la dictadura de','en nombre de la revolución de','con el consenso de',
            'a merced del algoritmo de','al margen del discurso hegemónico','por el mandato de la otredad',
            'con la retórica del capital','en el fetiche de','a través del panóptico de',
            'bajo la estructura del poder de','con la insurrección de','en el marco del pacto social de',
            'tras el fracaso de la utopía de','por la plusvalía de','como síntoma del neoliberalismo de',
            'en conflicto con la hegemonía de','en la performatividad de','con el contrato simbólico de',
            'en oposición al aparato ideológico de','desde la angustia de','con la fenomenología de',
            'en el pliegue de','a la deriva de','por el sinsentido de','con la hiperrealidad de',
            'a la luz de la náusea de','en la clausura de','por el simulacro de','como antítesis de',
            'bajo el espectro de lo real','tras la deconstrucción de','en el exilio de la verdad',
            'a través del concepto de','al margen de la metafísica','con el vacío de ser',
            'por la tautología de','en la ruptura del sujeto','en la fuga del tiempo','con la ansiedad de lo inasible',
            'al conjuro de','bajo el sello de','con la profecía de','al dictado del oráculo de','en la invocación de',
            'tras el velo de Isis','según los designios de','por la sangre del ritual de','a la sombra del zodíaco','con el signo de',
            'al compás de las constelaciones','desde el abismo de Lilith','en el canto de las esferas','con la alquimia de',
            'bajo el influjo lunar de','en la transmigración de','como símbolo hermético de','al reflejo de Mercurio retrógrado',
            'en el descenso de Inanna','por el sortilegio de'
        ];

        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }
        function capitalizeFirstLetter(string) {
            return string.charAt(0).toUpperCase() + string.slice(1);
        }


        async function load() {
            try {
                const response = await fetch('concepts.txt');
                const data = await response.text();
                const inputText = data.split('\n').filter(Boolean);

                // generate title
                document.getElementById('title').innerHTML = generatePoem(1, inputText).join('<br>');

                const numberOfLines = Math.floor(Math.random() * 10) + 6;
                document.getElementById('poem').innerHTML = generatePoem(numberOfLines, inputText).join('<br>');
            } catch (error) {
                console.error('Error fetching concepts.txt:', error);
            }
        }

        function getRandomElement(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function capitalizeFirstLetter(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function maybe(probability) {
            return Math.random() < probability;
        }

        function generatePoem(numberOfLines, words) {
            const poemLines = [];

            for (let i = 0; i < numberOfLines; i++) {
                const structureType = Math.floor(Math.random() * 4);
                let line = '';

                switch (structureType) {
                    case 0: // Concept + connector + concept
                        line = `${getRandomElement(words)} ${getRandomElement(connectors)} ${getRandomElement(words)}`;
                        break;
                    case 1: // Connector + concept
                        line = `${getRandomElement(connectors)} ${getRandomElement(words)}`;
                        break;
                    case 2: // Concept + concept
                        line = `${getRandomElement(words)} ${getRandomElement(words)}`;
                        break;
                    case 3: // Concept + connector + concept + connector + concept
                        line = `${getRandomElement(words)} ${getRandomElement(connectors)} ${getRandomElement(words)} ${getRandomElement(connectors)} ${getRandomElement(words)}`;
                        break;
                }

                // Random punctuation
                if (maybe(0.3)) line += maybe(0.5) ? '.' : '...';
                if (maybe(0.1)) line = '¡' + capitalizeFirstLetter(line) + '!';
                else line = capitalizeFirstLetter(line);

                // Line break logic
                poemLines.push(i % 4 === 0 && i !== 0 ? '<br>' + line : line);
            }

            return poemLines;
        }

        load();
    </script>
</body>

</html>
